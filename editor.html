<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdaptBase Ontology Editor</title>
  <style>
    :root {
      --fg: #1a1a1a;
      --fg-muted: #6b7280;
      --fg-faint: #9ca3af;
      --bg: #f9fafb;
      --bg-panel: #fff;
      --bg-inset: #f3f4f6;
      --border: #e5e7eb;
      --border-light: #f0f0f0;
      --accent: #2563eb;
      --accent-bg: #eff6ff;
      --accent-border: #bfdbfe;
      --danger: #dc2626;
      --danger-bg: #fef2f2;
      --success: #16a34a;
      --radius: 4px;
      --radius-lg: 6px;
      --mono: 'SF Mono', 'Cascadia Code', 'Fira Code', Menlo, monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; font-size: 13px; color: var(--fg); background: var(--bg); line-height: 1.5; }

    /* Header */
    #header { background: #111827; color: #f9fafb; padding: 8px 20px; display: flex; align-items: center; justify-content: space-between; }
    #header h1 { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
    #header .version-badge { background: #1f2937; padding: 2px 10px; border-radius: 3px; font-size: 12px; font-family: var(--mono); color: #9ca3af; }

    /* Tabs */
    #tabs { display: flex; background: var(--bg-panel); border-bottom: 1px solid var(--border); padding: 0 12px; }
    #tabs button { padding: 8px 16px; border: none; background: transparent; cursor: pointer; font-size: 12px; font-weight: 500; color: var(--fg-muted); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 0.1s; }
    #tabs button.active { color: var(--accent); border-bottom-color: var(--accent); }
    #tabs button:hover:not(.active) { color: var(--fg); }

    /* Layout */
    #main { display: flex; height: calc(100vh - 94px); }

    /* Sidebar */
    #sidebar { width: 240px; min-width: 240px; background: var(--bg-panel); border-right: 1px solid var(--border); overflow-y: auto; }
    #sidebar .item { padding: 6px 12px; cursor: pointer; border-bottom: 1px solid var(--border-light); font-size: 12px; transition: background 0.1s; }
    #sidebar .item:hover { background: var(--accent-bg); }
    #sidebar .item.active { background: var(--accent-bg); border-left: 3px solid var(--accent); padding-left: 9px; }
    #sidebar .item .sub { font-size: 11px; color: var(--fg-faint); font-family: var(--mono); }
    #sidebar .section-header { padding: 6px 12px; background: var(--bg-inset); font-size: 10px; font-weight: 700; color: var(--fg-faint); text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); }

    /* Detail pane */
    #detail { flex: 1; overflow-y: auto; padding: 20px 28px; }
    #detail .empty { color: var(--fg-faint); padding: 60px; text-align: center; font-size: 13px; }

    /* Status bar */
    #status-bar { background: var(--bg-panel); border-top: 1px solid var(--border); padding: 6px 20px; display: flex; align-items: center; justify-content: space-between; height: 40px; }
    #status-bar .changes { font-size: 12px; }
    #status-bar .changes.dirty { color: var(--danger); font-weight: 600; }
    #status-bar .changes.clean { color: var(--success); }
    #save-btn { padding: 5px 16px; border: none; border-radius: var(--radius); cursor: pointer; font-size: 12px; font-weight: 600; background: var(--accent); color: #fff; }
    #save-btn:hover { background: #1d4ed8; }
    #save-btn:disabled { background: #d1d5db; cursor: default; }

    /* Section headings in detail */
    h3 { font-size: 14px; font-weight: 600; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); color: var(--fg); }

    /* Collapsible sections */
    .section { margin-bottom: 16px; border: 1px solid var(--border); border-radius: var(--radius-lg); background: var(--bg-panel); }
    .section-toggle { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; cursor: pointer; user-select: none; background: var(--bg-inset); border-radius: var(--radius-lg) var(--radius-lg) 0 0; border-bottom: 1px solid var(--border); }
    .section-toggle h4 { font-size: 12px; font-weight: 600; color: var(--fg); margin: 0; }
    .section-toggle .badge { font-size: 11px; color: var(--fg-muted); font-family: var(--mono); }
    .section-toggle::before { content: '\25B6'; font-size: 9px; color: var(--fg-faint); margin-right: 8px; display: inline-block; transition: transform 0.15s; }
    .section-toggle.open::before { transform: rotate(90deg); }
    .section.collapsed .section-toggle { border-bottom: none; border-radius: var(--radius-lg); }
    .section-body { padding: 10px 12px; }
    .section.collapsed .section-body { display: none; }

    /* Forms */
    .form-group { margin-bottom: 10px; }
    .form-group label { display: block; font-size: 11px; font-weight: 600; color: var(--fg-muted); margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.03em; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 5px 8px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; font-family: inherit; background: var(--bg-panel); color: var(--fg); }
    .form-group textarea { min-height: 48px; resize: vertical; line-height: 1.4; }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(37,99,235,0.12); }
    .form-row { display: flex; gap: 10px; }
    .form-row .form-group { flex: 1; }

    /* Tables */
    .prop-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .prop-table th { text-align: left; padding: 4px 6px; background: var(--bg-inset); border: 1px solid var(--border); font-weight: 600; font-size: 11px; color: var(--fg-muted); text-transform: uppercase; letter-spacing: 0.03em; }
    .prop-table td { padding: 4px 6px; border: 1px solid var(--border); vertical-align: top; }
    .prop-table input, .prop-table textarea, .prop-table select { width: 100%; padding: 3px 5px; border: 1px solid var(--border); border-radius: 3px; font-size: 12px; font-family: inherit; }
    .prop-table textarea { min-height: 28px; resize: vertical; }

    /* Buttons */
    .btn-sm { padding: 3px 10px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-panel); cursor: pointer; font-size: 11px; font-weight: 500; }
    .btn-sm:hover { background: var(--bg-inset); }
    .btn-sm.danger { color: var(--danger); border-color: var(--danger); }
    .btn-sm.danger:hover { background: var(--danger-bg); }
    .btn-sm.primary { color: var(--accent); border-color: var(--accent-border); }
    .btn-sm.primary:hover { background: var(--accent-bg); }
    .btn-add { margin-top: 6px; }

    /* Relationship links */
    .rel-links { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
    .rel-link { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 3px; font-size: 11px; font-family: var(--mono); cursor: pointer; transition: background 0.1s; border: 1px solid var(--border); background: var(--bg-inset); }
    .rel-link:hover { background: var(--accent-bg); border-color: var(--accent-border); color: var(--accent); }
    .rel-link .arrow { color: var(--fg-faint); font-size: 10px; }
    .rel-link.outgoing { border-left: 2px solid var(--accent); }
    .rel-link.incoming { border-left: 2px solid #8b5cf6; }
    .backlink { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 12px; cursor: pointer; background: var(--bg-inset); border: 1px solid var(--border); color: var(--accent); font-weight: 500; transition: background 0.1s; }
    .backlink:hover { background: var(--accent-bg); }

    /* Vocab files tree */
    .tree-node { margin-left: 14px; }
    .tree-key { font-weight: 600; color: var(--fg); cursor: pointer; padding: 3px 0; display: inline-block; font-size: 12px; }
    .tree-key:hover { color: var(--accent); }
    .tree-key::before { content: '\25B6'; font-size: 9px; color: var(--fg-faint); margin-right: 6px; display: inline-block; transition: transform 0.15s; }
    .tree-key.open::before { transform: rotate(90deg); }
    .tree-leaf { margin-left: 14px; padding: 2px 0; display: flex; align-items: baseline; gap: 6px; }
    .tree-leaf label { font-size: 11px; color: var(--fg-muted); min-width: 100px; font-family: var(--mono); }
    .tree-leaf input, .tree-leaf textarea { flex: 1; padding: 3px 6px; border: 1px solid var(--border); border-radius: 3px; font-size: 12px; font-family: inherit; }
    .tree-leaf textarea { min-height: 28px; resize: vertical; }
    .tree-array-item { border-left: 2px solid var(--border); margin-left: 6px; padding-left: 10px; margin-bottom: 2px; }
    .tree-actions { margin-left: 14px; margin-top: 4px; }

    /* Version tab */
    .version-card { background: var(--bg-panel); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 12px; }
    .bump-options { display: flex; gap: 10px; margin: 12px 0; }
    .bump-option { flex: 1; border: 2px solid var(--border); border-radius: var(--radius-lg); padding: 12px; cursor: pointer; text-align: center; transition: border-color 0.15s; }
    .bump-option:hover { border-color: var(--accent); }
    .bump-option.selected { border-color: var(--accent); background: var(--accent-bg); }
    .bump-option.recommended { position: relative; }
    .bump-option.recommended::after { content: 'recommended'; position: absolute; top: -8px; right: 8px; background: var(--success); color: #fff; font-size: 10px; padding: 1px 6px; border-radius: 3px; }
    .bump-option .bump-label { font-weight: 600; font-size: 13px; }
    .bump-option .bump-version { color: var(--fg-muted); font-size: 12px; margin-top: 2px; font-family: var(--mono); }
    .bump-option .bump-desc { color: var(--fg-faint); font-size: 11px; margin-top: 4px; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .modal { background: var(--bg-panel); border-radius: 8px; padding: 24px; width: 500px; max-width: 90%; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
    .modal h3 { border: none; padding: 0; margin-bottom: 16px; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
    .modal-actions button { padding: 8px 20px; border: none; border-radius: var(--radius); cursor: pointer; font-size: 12px; font-weight: 500; }

    /* Vocab file selector */
    #vocab-file-select { padding: 5px 10px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 12px; margin-bottom: 12px; font-family: var(--mono); }

    /* Danger zone */
    .danger-zone { margin-top: 20px; padding-top: 12px; border-top: 1px dashed var(--border); }
  </style>
</head>
<body>
  <div id="header">
    <h1>AdaptBase Ontology Editor</h1>
    <span id="version-badge" class="version-badge">loading...</span>
  </div>
  <div id="tabs">
    <button data-tab="types" class="active">Types</button>
    <button data-tab="relationships">Relationships</button>
    <button data-tab="vocabularies">Vocabularies</button>
    <button data-tab="vocab-files">Vocab Files</button>
    <button data-tab="version">Version</button>
  </div>
  <div id="main">
    <div id="sidebar"></div>
    <div id="detail"><div class="empty">Select an item to edit</div></div>
  </div>
  <div id="status-bar">
    <span id="change-status" class="changes clean">No unsaved changes</span>
    <button id="save-btn" disabled>Save Version</button>
  </div>

  <script src="scripts/editor-app.js"></script>
</body>
</html>
