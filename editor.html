<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdaptBase Ontology Editor</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

    :root {
      --fg: #1c1c1e;
      --fg-muted: #6c7280;
      --fg-faint: #a0a8b4;
      --bg: #f5f4f1;
      --bg-panel: #fdfcfa;
      --bg-inset: #efede8;
      --border: #e0ddd7;
      --border-light: #eae7e2;
      --accent: #2563eb;
      --accent-bg: #eff6ff;
      --accent-border: #bfdbfe;
      --danger: #dc2626;
      --danger-bg: #fef2f2;
      --success: #16a34a;
      --radius: 4px;
      --radius-lg: 7px;
      --sans: 'Inter Tight', -apple-system, BlinkMacSystemFont, sans-serif;
      --mono: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--sans); font-size: 15px; color: var(--fg); background: var(--bg); line-height: 1.5; -webkit-font-smoothing: antialiased; }

    /* Header */
    #header { background: #0f172a; color: #f1f5f9; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05); }
    #header h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.02em; font-family: var(--sans); }
    #header .version-badge { background: rgba(255,255,255,0.07); padding: 3px 10px; border-radius: 4px; font-size: 12px; font-family: var(--mono); color: #94a3b8; border: 1px solid rgba(255,255,255,0.1); }

    /* Tabs */
    #tabs { display: flex; background: var(--bg-panel); border-bottom: 1px solid var(--border); padding: 0 16px; }
    #tabs button { padding: 10px 16px; border: none; background: transparent; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--fg-muted); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 0.15s; font-family: var(--sans); letter-spacing: -0.01em; }
    #tabs button.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
    #tabs button:hover:not(.active) { color: var(--fg); }

    /* Layout */
    #main { display: flex; height: calc(100vh - 100px); }

    /* Sidebar */
    #sidebar { width: 240px; min-width: 240px; background: var(--bg-panel); border-right: 1px solid var(--border); overflow-y: auto; }
    #sidebar .item { padding: 8px 14px; cursor: pointer; border-bottom: 1px solid var(--border-light); font-size: 14px; transition: background 0.1s; line-height: 1.3; }
    #sidebar .item:hover { background: var(--accent-bg); }
    #sidebar .item.active { background: var(--accent-bg); border-left: 2px solid var(--accent); padding-left: 12px; font-weight: 600; color: var(--accent); }
    #sidebar .item .sub { font-size: 12px; color: var(--fg-faint); font-family: var(--mono); margin-top: 1px; }
    #sidebar .section-header { padding: 7px 14px; background: var(--bg-inset); font-size: 10px; font-weight: 700; color: var(--fg-faint); text-transform: uppercase; letter-spacing: 0.09em; border-bottom: 1px solid var(--border); font-family: var(--mono); }

    /* Detail pane */
    #detail { flex: 1; overflow-y: auto; padding: 24px 32px; }
    #detail .empty { color: var(--fg-faint); padding: 80px 60px; text-align: center; font-size: 15px; }

    /* Status bar */
    #status-bar { background: var(--bg-panel); border-top: 1px solid var(--border); padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 42px; }
    #status-bar .changes { font-size: 12px; font-family: var(--mono); letter-spacing: 0.01em; }
    #status-bar .changes.dirty { color: var(--danger); font-weight: 600; }
    #status-bar .changes.clean { color: var(--success); }
    #save-btn { padding: 6px 18px; border: none; border-radius: var(--radius); cursor: pointer; font-size: 13px; font-weight: 600; background: var(--accent); color: #fff; font-family: var(--sans); letter-spacing: -0.01em; transition: background 0.15s; }
    #save-btn:hover { background: #1d4ed8; }
    #save-btn:disabled { background: #d1d5db; color: #9ca3af; cursor: default; }

    /* Section headings in detail */
    h3 { font-size: 16px; font-weight: 700; margin-bottom: 18px; padding-bottom: 10px; border-bottom: 1px solid var(--border); color: var(--fg); letter-spacing: -0.02em; }

    /* Collapsible sections */
    .section { margin-bottom: 16px; border: 1px solid var(--border); border-radius: var(--radius-lg); background: var(--bg-panel); overflow: hidden; }
    .section-toggle { display: flex; align-items: center; justify-content: space-between; padding: 9px 14px; cursor: pointer; user-select: none; background: var(--bg-inset); border-radius: var(--radius-lg) var(--radius-lg) 0 0; border-bottom: 1px solid var(--border); }
    .section-toggle h4 { font-size: 11px; font-weight: 700; color: var(--fg-muted); margin: 0; text-transform: uppercase; letter-spacing: 0.07em; font-family: var(--mono); }
    .section-toggle .badge { font-size: 11px; color: var(--fg-faint); font-family: var(--mono); background: var(--bg-panel); padding: 1px 7px; border-radius: 999px; border: 1px solid var(--border); }
    .section-toggle::before { content: '›'; font-size: 18px; color: var(--fg-faint); margin-right: 8px; display: inline-block; transition: transform 0.15s; line-height: 1; }
    .section-toggle.open::before { transform: rotate(90deg); }
    .section.collapsed .section-toggle { border-bottom: none; border-radius: var(--radius-lg); }
    .section-body { padding: 12px 14px; }
    .section.collapsed .section-body { display: none; }

    /* Forms */
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 10px; font-weight: 700; color: var(--fg-faint); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.09em; font-family: var(--mono); }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px; font-family: var(--sans); background: var(--bg-panel); color: var(--fg); transition: border-color 0.15s, box-shadow 0.15s; }
    .form-group textarea { min-height: 52px; resize: vertical; line-height: 1.5; }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.10); }
    .form-row { display: flex; gap: 12px; }
    .form-row .form-group { flex: 1; }

    /* Tables */
    .prop-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .prop-table th { text-align: left; padding: 5px 8px; background: var(--bg-inset); border: 1px solid var(--border); font-weight: 700; font-size: 10px; color: var(--fg-faint); text-transform: uppercase; letter-spacing: 0.09em; font-family: var(--mono); }
    .prop-table td { padding: 4px 6px; border: 1px solid var(--border); vertical-align: top; }
    .prop-table tr:nth-child(even) td { background: rgba(0,0,0,0.018); }
    .prop-table input, .prop-table textarea, .prop-table select { width: 100%; padding: 4px 6px; border: 1px solid var(--border); border-radius: 3px; font-size: 13px; font-family: var(--sans); background: transparent; transition: border-color 0.1s; }
    .prop-table input:focus, .prop-table textarea:focus, .prop-table select:focus { outline: none; border-color: var(--accent); background: var(--bg-panel); }
    .prop-table textarea { min-height: 28px; resize: vertical; }

    /* Buttons */
    .btn-sm { padding: 4px 12px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-panel); cursor: pointer; font-size: 12px; font-weight: 600; font-family: var(--sans); transition: background 0.1s, border-color 0.1s; }
    .btn-sm:hover { background: var(--bg-inset); border-color: #ccc; }
    .btn-sm.danger { color: var(--danger); border-color: #fca5a5; }
    .btn-sm.danger:hover { background: var(--danger-bg); border-color: var(--danger); }
    .btn-sm.primary { color: var(--accent); border-color: var(--accent-border); background: var(--accent-bg); }
    .btn-sm.primary:hover { background: #dbeafe; border-color: #93c5fd; }
    .btn-add { margin-top: 8px; }

    /* Relationship links */
    .rel-links { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px; }
    .rel-link { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 4px; font-size: 12px; font-family: var(--mono); cursor: pointer; transition: all 0.1s; border: 1px solid var(--border); background: var(--bg-inset); color: var(--fg-muted); }
    .rel-link:hover { background: var(--accent-bg); border-color: var(--accent-border); color: var(--accent); }
    .rel-link .arrow { color: var(--fg-faint); font-size: 11px; }
    .rel-link.outgoing { border-left: 2px solid var(--accent); }
    .rel-link.incoming { border-left: 2px solid #8b5cf6; }
    .backlink { display: inline-block; padding: 2px 10px; border-radius: 4px; font-size: 13px; cursor: pointer; background: var(--accent-bg); border: 1px solid var(--accent-border); color: var(--accent); font-weight: 600; transition: background 0.1s; font-family: var(--sans); }
    .backlink:hover { background: #dbeafe; }

    /* Vocab files tree */
    .tree-node { margin-left: 16px; }
    .tree-key { font-weight: 600; color: var(--fg); cursor: pointer; padding: 4px 0; display: inline-block; font-size: 13px; }
    .tree-key:hover { color: var(--accent); }
    .tree-key::before { content: '›'; font-size: 17px; color: var(--fg-faint); margin-right: 5px; display: inline-block; transition: transform 0.15s; line-height: 1; }
    .tree-key.open::before { transform: rotate(90deg); }
    .tree-leaf { margin-left: 14px; padding: 2px 0; display: flex; align-items: baseline; gap: 8px; }
    .tree-leaf label { font-size: 11px; color: var(--fg-faint); min-width: 100px; font-family: var(--mono); }
    .tree-leaf input, .tree-leaf textarea { flex: 1; padding: 3px 7px; border: 1px solid var(--border); border-radius: 3px; font-size: 13px; font-family: var(--sans); }
    .tree-leaf input:focus, .tree-leaf textarea:focus { outline: none; border-color: var(--accent); }
    .tree-leaf textarea { min-height: 28px; resize: vertical; }
    .tree-array-item { border-left: 2px solid var(--border-light); margin-left: 6px; padding-left: 12px; margin-bottom: 3px; }
    .tree-actions { margin-left: 14px; margin-top: 4px; }

    /* Version tab */
    .version-card { background: var(--bg-panel); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px; margin-bottom: 14px; }
    .bump-options { display: flex; gap: 10px; margin: 14px 0; }
    .bump-option { flex: 1; border: 1.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px; cursor: pointer; text-align: center; transition: border-color 0.15s, background 0.15s; background: var(--bg-panel); }
    .bump-option:hover { border-color: var(--accent); background: var(--accent-bg); }
    .bump-option.selected { border-color: var(--accent); background: var(--accent-bg); }
    .bump-option.recommended { position: relative; }
    .bump-option.recommended::after { content: 'recommended'; position: absolute; top: -9px; right: 8px; background: var(--success); color: #fff; font-size: 11px; padding: 1px 7px; border-radius: 3px; font-family: var(--sans); font-weight: 600; }
    .bump-option .bump-label { font-weight: 700; font-size: 14px; font-family: var(--sans); }
    .bump-option .bump-version { color: var(--fg-muted); font-size: 13px; margin-top: 3px; font-family: var(--mono); }
    .bump-option .bump-desc { color: var(--fg-faint); font-size: 12px; margin-top: 5px; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(3px); }
    .modal { background: var(--bg-panel); border-radius: 10px; padding: 28px; width: 520px; max-width: 90%; max-height: 85vh; overflow-y: auto; box-shadow: 0 24px 64px rgba(0,0,0,0.18); border: 1px solid var(--border); }
    .modal h3 { border: none; padding: 0; margin-bottom: 18px; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
    .modal-actions button { padding: 8px 20px; border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; font-size: 13px; font-weight: 600; font-family: var(--sans); transition: all 0.15s; background: var(--bg-inset); color: var(--fg); }
    .modal-actions button:hover { background: var(--bg-panel); border-color: #bbb; }

    /* Vocab file selector */
    #vocab-file-select { padding: 7px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; margin-bottom: 14px; font-family: var(--mono); background: var(--bg-panel); color: var(--fg); }
    #vocab-file-select:focus { outline: none; border-color: var(--accent); }

    /* Danger zone */
    .danger-zone { margin-top: 24px; padding-top: 14px; border-top: 1px dashed var(--border); }
  </style>
</head>
<body>
  <div id="header">
    <h1>AdaptBase Ontology Editor</h1>
    <span id="version-badge" class="version-badge">loading...</span>
  </div>
  <div id="tabs">
    <button data-tab="types" class="active">Types</button>
    <button data-tab="relationships">Relationships</button>
    <button data-tab="vocabularies">Vocabularies</button>
    <button data-tab="vocab-files">Vocab Files</button>
    <button data-tab="version">Version</button>
  </div>
  <div id="main">
    <div id="sidebar"></div>
    <div id="detail"><div class="empty">Select an item to edit</div></div>
  </div>
  <div id="status-bar">
    <span id="change-status" class="changes clean">No unsaved changes</span>
    <button id="save-btn" disabled>Save Version</button>
  </div>

  <script src="scripts/editor-app.js"></script>
</body>
</html>
