<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ontology Mining Review</title>
<style>
  :root {
    --bg: #ffffff;
    --panel: #f5f5f7;
    --panel-light: #e8e8ed;
    --border: #d1d1d6;
    --border-light: #e5e5ea;
    --text: #1d1d1f;
    --text-dim: #6e6e73;
    --accent: #007aff;
    --accent-dim: #cce4ff;
    --good: #16a34a;
    --warn: #f59e0b;
    --danger: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: grid;
    grid-template-columns: 360px 1fr 360px;
    grid-template-rows: 48px 1fr 56px;
    font-size: 13px;
  }
  header {
    grid-column: 1 / -1;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 10px;
  }
  header h1 {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  header .spacer { flex: 1; }
  header select, header button {
    background: var(--panel-light);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 5px 11px;
    border-radius: 6px;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
  }
  header button:hover, header select:hover { background: var(--accent-dim); }
  #progress {
    font-size: 12px;
    color: var(--text-dim);
    min-width: 120px;
    text-align: right;
  }

  .sidebar {
    background: var(--panel);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px;
    min-height: 0;
  }
  .sidebar.right { border-right: none; border-left: 1px solid var(--border); }
  .sidebar h2 {
    font-size: 10px;
    text-transform: uppercase;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    margin: 16px 0 6px;
    font-weight: 600;
  }
  .sidebar h2:first-child { margin-top: 0; }

  .example {
    padding: 8px 10px;
    border: 1px solid var(--border-light);
    border-radius: 6px;
    background: var(--bg);
    margin-bottom: 8px;
    line-height: 1.5;
  }
  .example .ex-title { font-weight: 600; margin-bottom: 3px; font-size: 12px; }
  .example .ex-meta { font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }
  .example .ex-snippet { font-size: 12px; }

  .meta-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 12px; }
  .meta-row .mk { color: var(--text-dim); }
  .meta-row .mv { font-weight: 500; text-align: right; max-width: 180px; }

  .seed-mech { padding: 6px 8px; margin-bottom: 6px; border-left: 3px solid var(--accent); background: var(--panel-light); border-radius: 4px; }
  .seed-mech .seed-id { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 10px; color: var(--accent); font-weight: 600; margin-bottom: 2px; }
  .seed-mech .seed-name { font-size: 11px; font-weight: 600; margin-bottom: 2px; }
  .seed-mech .seed-desc { font-size: 11px; color: var(--text-dim); line-height: 1.4; }

  /* Main pane */
  main {
    padding: 24px 32px;
    overflow-y: auto;
    min-height: 0;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .chip {
    display: inline-block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    background: var(--accent-dim);
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
  }
  .chip.alt { color: var(--warn); background: #fef3c7; }
  .chip.good { color: var(--good); background: #dcfce7; }

  .field label {
    display: block;
    font-size: 10px;
    text-transform: uppercase;
    color: var(--text-dim);
    letter-spacing: 0.07em;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .field input, .field textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    font-family: inherit;
    font-size: 14px;
    color: var(--text);
  }
  .field textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
  .field input:focus, .field textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }

  .proposed-id {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 12px;
    color: var(--text-dim);
  }

  /* Footer */
  footer {
    grid-column: 1 / -1;
    background: var(--panel);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 8px;
  }
  footer button {
    padding: 9px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    background: var(--panel-light);
    color: var(--text);
  }
  footer button:hover { background: var(--accent-dim); }
  footer button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  footer button.primary:hover { background: #006fe0; }
  footer button.reject { color: var(--danger); border-color: var(--danger); }
  footer button.reject:hover { background: #fee2e2; }
  footer button.defer { color: var(--warn); border-color: var(--warn); }
  footer button.defer:hover { background: #fef3c7; }
  footer .spacer { flex: 1; }
  footer kbd {
    background: var(--border-light);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 5px;
    font-size: 10px;
    font-family: ui-monospace, Menlo, monospace;
  }

  .prior-decision {
    background: var(--accent-dim);
    color: var(--accent);
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 12px;
    margin-bottom: 8px;
  }
  .prior-decision.rejected { background: #fee2e2; color: var(--danger); }
  .prior-decision.deferred { background: #fef3c7; color: var(--warn); }

  .empty-state {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    font-size: 14px;
    line-height: 1.6;
    text-align: center;
    padding: 40px;
  }
</style>
</head>
<body>
<header>
  <h1>Ontology Mining Review</h1>
  <select id="phase">
    <option value="distribution">Distribution Gaps (Phase D)</option>
    <option value="mechanisms">Mechanism Taxonomy (Phase A)</option>
    <option value="plans">Plan Properties (Phase P)</option>
  </select>
  <button id="prev" title="Previous (←)">← Prev</button>
  <button id="next" title="Next (→)">Next →</button>
  <div class="spacer"></div>
  <div id="progress">–</div>
</header>

<aside class="sidebar" id="evidence-pane">
  <h2>Evidence</h2>
  <div id="evidence">Loading…</div>
</aside>

<main id="main">
  <div class="empty-state">Select a phase and load proposals to begin.</div>
</main>

<aside class="sidebar right" id="meta-pane">
  <h2>Existing Mechanism Vocabulary</h2>
  <div id="existing-vocab"></div>
  <h2>Metadata</h2>
  <div id="meta"></div>
  <h2>Alternative mapping</h2>
  <div id="alt"></div>
  <h2>External vocab match</h2>
  <div id="ext"></div>
</aside>

<footer>
  <button id="btn-reject" class="reject" title="Reject (r)">Reject</button>
  <button id="btn-defer" class="defer" title="Defer (d)">Defer</button>
  <div class="spacer"></div>
  <span style="font-size:11px;color:var(--text-dim)">
    <kbd>←</kbd> prev &nbsp; <kbd>→</kbd> next &nbsp; <kbd>a</kbd> approve &nbsp; <kbd>r</kbd> reject &nbsp; <kbd>d</kbd> defer
  </span>
  <button id="btn-approve" class="primary" title="Approve (a)">Approve</button>
</footer>

<script src="/viewer/review.js?v=2"></script>
</body>
</html>
